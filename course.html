<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Course — Fit to Practise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/img/F2P-logo-09-2.png">
<link rel="stylesheet" href="assets/css/site.css">
<script src="assets/js/cart.js"></script>
<script src="assets/js/icons.js"></script>
<script src="assets/js/site.js"></script>
<style>
  @media (max-width: 900px) { .cd-grid { flex-direction: column !important; } .cd-aside { position: static !important; width: 100% !important; } }
</style>
</head>
<body>
<div id="site-header" data-active="courses"></div>

<section style="padding:34px 0 70px;">
  <div style="max-width:1180px;margin:0 auto;padding:0 24px;">
    <div id="crumb" style="font-size:13.5px;color:#9A92A4;margin-bottom:20px;"></div>
    <div id="detail"></div>
  </div>
</section>

<div id="site-footer"></div>

<div id="toast" style="display:none;position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:200;background:#271640;color:#fff;font-weight:600;font-size:14.5px;padding:13px 22px;border-radius:999px;box-shadow:0 20px 44px -16px rgba(0,0,0,0.5);"></div>

<script>
(function () {
  var F = window.F2P;
  var id;
  try { id = new URLSearchParams(location.search).get('c'); } catch (e) {}
  if (!id || !F.courseById(id)) id = F.COURSES[0].id;
  var c = F.courseById(id);

  var crumb = document.getElementById('crumb');
  var root = document.getElementById('detail');
  var toastEl = document.getElementById('toast');
  var toastT;
  function esc(s) { return String(s).replace(/[&<>"]/g, function (ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[ch]; }); }
  function toast(msg) {
    toastEl.innerHTML = '✓ ' + esc(msg) + ' <a href="cart.html" style="color:#5BD6A0;font-weight:700;margin-left:6px;">View cart</a>';
    toastEl.style.display = 'block'; clearTimeout(toastT);
    toastT = setTimeout(function () { toastEl.style.display = 'none'; }, 1900);
  }

  var outcomes = [
    'Understand each stage of the Fitness to Practise process',
    'Apply your professional Code of Conduct in practice',
    'Build confidence and emotional resilience',
    'Identify and articulate your future learning needs'
  ];

  function render() {
    var inCart = F.inCart(c.id);
    var enrolled = F.isEnrolled(c.id);
    var meta = c.sessions + (c.sessions === 1 ? ' session' : ' sessions') + ' · ' + c.hours + 'h · ' + c.level;
    crumb.innerHTML = '<a href="index.html" style="color:#9A92A4;">Home</a> <span style="margin:0 6px;">›</span> <a href="courses.html" style="color:#9A92A4;">Courses</a> <span style="margin:0 6px;">›</span> <span style="color:#1C8A5E;font-weight:600;">' + esc(c.category) + '</span>';

    var curriculum = '';
    for (var i = 0; i < c.sessions; i++) {
      var t = i === 0 ? 'Introduction &amp; getting started' : (i === c.sessions - 1 ? 'Bringing it all together' : 'Module ' + (i + 1) + ': core concepts');
      var len = (8 + (i % 4) * 4) + ' min';
      curriculum += '<div style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #ECE6DA;border-radius:14px;padding:15px 18px;"><span style="width:32px;height:32px;border-radius:9px;background:#F1ECF4;color:#5B3E86;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;">' + (i + 1) + '</span><span style="font-weight:600;font-size:15.5px;color:#20122F;flex:1;">' + t + '</span><span style="font-size:13px;color:#9A92A4;">' + len + '</span></div>';
    }
    var outHtml = outcomes.map(function (o) {
      return '<div style="display:flex;align-items:flex-start;gap:11px;font-size:15.5px;color:#3A2F4A;line-height:1.5;"><span style="width:22px;height:22px;border-radius:50%;background:#E7F2EC;color:#1C8A5E;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:1px;">✓</span>' + esc(o) + '</div>';
    }).join('');

    var buyBlock;
    if (enrolled) {
      buyBlock = '<a href="my-courses.html" class="btn" style="text-align:center;background:#271640;color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:14px;">Go to my course →</a>';
    } else {
      buyBlock = '<button id="buyBtn" class="btn" style="background:#1C8A5E;color:#fff;border:none;font-family:\'Hanken Grotesk\';font-weight:700;font-size:16px;padding:15px;border-radius:14px;cursor:pointer;box-shadow:0 14px 30px -12px rgba(28,138,94,0.6);">Buy now</button>' +
        (inCart
          ? '<a href="cart.html" style="text-align:center;background:#E7F2EC;color:#15724C;font-weight:700;font-size:15px;padding:13px;border-radius:14px;">In cart — view cart ✓</a>'
          : '<button id="addBtn" class="btn" style="background:#fff;color:#20122F;border:1px solid #E0D9CC;font-family:\'Hanken Grotesk\';font-weight:700;font-size:15px;padding:13px;border-radius:14px;cursor:pointer;">Add to cart</button>');
    }

    root.innerHTML = '' +
      '<div class="cd-grid" style="display:flex;gap:40px;align-items:flex-start;">' +
        '<div style="flex:1 1 auto;min-width:0;">' +
          '<span style="display:inline-block;background:#E7F2EC;color:#15724C;font-weight:700;font-size:12px;letter-spacing:0.05em;padding:6px 14px;border-radius:999px;">' + esc(c.category) + '</span>' +
          '<h1 style="font-family:\'Schibsted Grotesk\';font-weight:800;letter-spacing:-0.025em;line-height:1.08;font-size:clamp(30px,4vw,46px);margin:16px 0 0;color:#20122F;">' + esc(c.title) + '</h1>' +
          '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:18px 0 0;font-size:14.5px;color:#6B6275;">' +
            '<span style="color:#C99A2E;font-weight:700;">★ ' + c.rating.toFixed(1) + ' <span style="color:#9A92A4;font-weight:400;">(' + c.reviews + ' reviews)</span></span>' +
            '<span style="display:flex;align-items:center;gap:7px;"><img src="' + c.avatar + '" style="width:24px;height:24px;border-radius:50%;background:#EFEAE0;">' + esc(c.author) + '</span>' +
            '<span>' + esc(meta) + '</span>' +
          '</div>' +
          '<div style="border-radius:24px;overflow:hidden;border:1px solid #ECE6DA;margin-top:26px;box-shadow:0 30px 70px -44px rgba(30,18,48,0.45);"><img src="' + c.img + '" alt="' + esc(c.title) + '" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;background:#EFEAE0;"></div>' +
          '<h2 style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:24px;margin:38px 0 12px;color:#20122F;">About this course</h2>' +
          '<p style="font-size:16.5px;line-height:1.7;color:#5C5369;margin:0;">' + esc(c.blurb) + '</p>' +
          '<p style="font-size:16.5px;line-height:1.7;color:#5C5369;margin:14px 0 0;">You\'ll learn at your own pace with lifetime access on mobile and desktop, and every lesson relates back to your professional Code of Conduct as well as your real workplace experience.</p>' +
          '<h2 style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:24px;margin:36px 0 16px;color:#20122F;">What you\'ll learn</h2>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;">' + outHtml + '</div>' +
          '<h2 style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:24px;margin:38px 0 16px;color:#20122F;">Course content</h2>' +
          '<div style="display:flex;flex-direction:column;gap:10px;">' + curriculum + '</div>' +
          '<div style="display:flex;gap:18px;align-items:center;background:#fff;border:1px solid #ECE6DA;border-radius:20px;padding:24px;margin-top:34px;">' +
            '<img src="' + c.avatar + '" alt="' + esc(c.author) + '" style="width:64px;height:64px;border-radius:50%;flex-shrink:0;background:#EFEAE0;">' +
            '<div><div style="font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:#9A92A4;font-weight:600;">Your instructor</div><div style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:19px;color:#20122F;margin-top:3px;">' + esc(c.author) + '</div><p style="font-size:14.5px;line-height:1.55;color:#6B6275;margin:6px 0 0;">A fellow healthcare professional bringing real-world experience and practical, lived insight into the Fitness to Practise process.</p></div>' +
          '</div>' +
        '</div>' +
        '<aside class="cd-aside" style="flex-shrink:0;width:340px;position:sticky;top:90px;">' +
          '<div style="background:#fff;border:1px solid #ECE6DA;border-radius:24px;padding:26px;box-shadow:0 30px 70px -40px rgba(30,18,48,0.4);">' +
            '<div style="display:flex;align-items:baseline;gap:10px;"><span style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:40px;color:#20122F;">£' + c.price + '</span><span style="font-size:14px;color:#9A92A4;">one-off · lifetime access</span></div>' +
            '<div style="display:flex;flex-direction:column;gap:11px;margin:22px 0;">' + buyBlock + '</div>' +
            '<div style="border-top:1px solid #F0EBE0;padding-top:18px;display:flex;flex-direction:column;gap:11px;font-size:14px;color:#5C5369;">' +
              '<div style="display:flex;align-items:center;gap:10px;"><span style="color:#1C8A5E;">✓</span> Lifetime access on all devices</div>' +
              '<div style="display:flex;align-items:center;gap:10px;"><span style="color:#1C8A5E;">✓</span> ' + esc(meta) + '</div>' +
              '<div style="display:flex;align-items:center;gap:10px;"><span style="color:#1C8A5E;">✓</span> Certificate of completion</div>' +
              '<div style="display:flex;align-items:center;gap:10px;"><span style="color:#1C8A5E;">✓</span> Learn at your own pace</div>' +
            '</div>' +
          '</div>' +
          '<p style="text-align:center;font-size:13px;color:#9A92A4;margin:14px 0 0;">Secure checkout · 14-day refund policy</p>' +
        '</aside>' +
      '</div>';

    document.title = c.title + ' — Fit to Practise';
    var addBtn = document.getElementById('addBtn');
    if (addBtn) addBtn.addEventListener('click', function () { F.addToCart(c.id); toast('Added to cart'); });
    var buyBtn = document.getElementById('buyBtn');
    if (buyBtn) buyBtn.addEventListener('click', function () { F.addToCart(c.id); location.href = 'cart.html'; });
  }

  window.addEventListener('f2p-change', render);
  window.addEventListener('storage', render);
  render();
})();
</script>
</body>
</html>
