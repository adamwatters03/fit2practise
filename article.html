      lead: 'A referral letter can feel overwhelming. Here is a calm, practical guide to the very first things to do — and what not to do — when you first hear from your regulator.',
      body: [
        ['p', 'Opening a letter from your regulator is one of the most stressful moments in a healthcare career. Your heart races, and it is easy to react on emotion. The most important thing to remember is this: a referral is the start of a process, not a verdict. Taking a few calm, deliberate steps now will put you in the best possible position.'],
        ['h2', '1. Read it carefully, then put it down'],
        ['p', 'Read the letter once to understand what is being alleged and what is being asked of you, then step away. Do not reply immediately or in anger. You will think far more clearly after a night\'s sleep.'],
        ['h2', '2. Note every deadline'],
        ['p', 'Regulators work to timescales. Write down any dates by which you need to respond, and give yourself plenty of time to prepare rather than rushing at the last minute.'],
        ['h2', '3. Tell the people who can support you'],
        ['p', 'Speak to your union or professional indemnity provider as early as possible. Consider reaching out for mentorship from someone who has been through the process — having a steady voice beside you makes an enormous difference.'],
        ['h2', '4. Start gathering your evidence'],
        ['p', 'Keep a folder of anything relevant: reflective notes, training records, and testimonials. The earlier you start, the calmer and more complete your response will be.'],
        ['h2', '5. Look after yourself'],
        ['p', 'This is a marathon, not a sprint. Protect your wellbeing, lean on people you trust, and remember that many professionals come through this and return to practice stronger than before.']
      ]
    },
    'reflection-standards': {
      cat: 'Reflective Practice', read: '5 min read', img: IMG + 'Reflection-Writing-1-750x500.jpg',
      title: 'How to write a reflection that meets regulatory standards',
      lead: 'Structure, tone and the key elements panels look for in a strong reflective piece.',
      body: [
        ['p', 'A strong reflection is not about saying the right words — it is about genuinely demonstrating insight. Panels want to see that you understand what happened, why it mattered, and how you have changed as a result.'],
        ['h2', 'Use a clear structure'],
        ['p', 'A simple, honest structure works best: what happened, how you felt, what you have learned, and what you will do differently. Keep it specific to your own practice rather than writing in generalities.'],
        ['h2', 'Show insight, not just remorse'],
        ['p', 'Saying sorry is not enough. Demonstrate that you understand the impact on patients and colleagues, and connect your learning back to your professional Code of Conduct.'],
        ['h2', 'Evidence the change'],
        ['ul', ['Reference the specific training or reading you have undertaken.', 'Describe concrete changes to your day-to-day practice.', 'Explain how you would handle a similar situation now.']],
        ['p', 'Written well, a reflection turns a difficult experience into clear evidence of a safe, thoughtful professional.']
      ]
    },
    'hearing-what-happens': {
      cat: 'Hearings', read: '6 min read', img: IMG + 'Healthcare-professional-on-laptop-750x500.jpg',

      lead: 'A walk-through of the room, the people, and the order of events on the day.',

        ['p', 'Fear of the unknown is one of the hardest parts of a hearing. Knowing what to expect on the day removes a great deal of that anxiety.'],
        ['h2', 'Who is in the room'],
        ['p', 'A panel usually includes registrant and lay members, supported by a legal adviser. There will be a case presenter, and you may be represented too. Everyone is there to consider the facts fairly.'],

        ['ul', ['The allegations are read and the facts are considered.', 'Evidence and witnesses are heard from both sides.', 'The panel considers whether your fitness to practise is impaired.', 'If so, it decides on an appropriate outcome.']],

      ]
    },

        ['p', 'Returning to practice after time away can be daunting. Confidence is rebuilt in small steps, not all at once.'],
        ['h2', 'Start with the basics'],

        ['h2', 'Lean on support'],
        ['p', 'A mentor or supervised return can make a world of difference. Talking through your worries with someone who understands helps put them in perspective.'],

        ['p', 'Put the interests of the people in your care first, treat them with dignity, and respect their right to be involved in decisions about their care.'],
        ['h2', 'Practise effectively'],

        '<h1 style="font-family:\'Schibsted Grotesk\';font-weight:800;letter-spacing:-0.025em;line-height:1.1;font-size:clamp(30px,4.2vw,46px);margin:18px auto 0;max-width:760px;">' + esc(post.title) + '</h1>' +
