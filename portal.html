    .fp-side { width: 74px !important; }

  @media (max-width: 780px) {
    .fp-topsearch { display: none !important; }

    .three-col { grid-template-columns: 1fr !important; }
    .fp-rail { width: 100% !important; }
  }
</style>

    var prog = F.getProgress();

  // ---------------- view renderers ----------------

          '<div style="background:#FBEFD3;border-radius:18px;padding:22px;"><div style="width:44px;height:44px;border-radius:12px;background:#D9A62B;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;margin-bottom:14px;">◐</div><div style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:30px;color:#20122F;">' + agg.inProgress + '</div><div style="font-size:13.5px;color:#6B6275;margin-top:2px;">In progress</div></div>' +
          '<div style="background:#271640;border-radius:18px;padding:22px;"><div style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;margin-bottom:14px;">🔖</div><div style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:30px;color:#fff;">' + agg.upcoming + '</div><div style="font-size:13.5px;color:rgba(255,255,255,0.82);margin-top:2px;">Available to start</div></div>' +
        '</div>' +
        '<div style="background:#fff;border:1px solid #ECE6DA;border-radius:20px;padding:24px;margin-top:20px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><h3 style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:18px;margin:0;color:#20122F;">Learning activity</h3>' +
          '<div style="display:flex;gap:16px;font-size:12.5px;color:#6B6275;"><span style="display:flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:50%;background:#1C8A5E;"></span>This week</span><span style="display:flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:50%;background:#D9A62B;"></span>Last week</span></div></div>' +

            '<div style="display:flex;gap:13px;align-items:center;"><div style="width:46px;height:46px;border-radius:12px;background:#FBEFD3;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:16px;color:#9A7414;line-height:1;">18</span><span style="font-size:10px;color:#6B6275;">Jul</span></div><div><div style="font-weight:700;font-size:14.5px;color:#20122F;">Hearing prep · 1:1 mentorship</div><div style="font-size:12.5px;color:#9A92A4;">14:00 – 15:00 · Adam Watters</div></div></div>' +
            '<div style="display:flex;gap:13px;align-items:center;"><div style="width:46px;height:46px;border-radius:12px;background:#F1ECF4;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:16px;color:#5B3E86;line-height:1;">22</span><span style="font-size:10px;color:#6B6275;">Jul</span></div><div><div style="font-weight:700;font-size:14.5px;color:#20122F;">Code of Conduct workshop</div><div style="font-size:12.5px;color:#9A92A4;">11:00 – 12:30 · Cathryn Watters</div></div></div>' +

  function coursesView() {
    var cats = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:30px;">' +
      '<div style="background:#fff;border:1px solid #ECE6DA;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:12px;"><span style="width:40px;height:40px;border-radius:11px;background:#E7F2EC;display:flex;align-items:center;justify-content:center;font-size:18px;">🧭</span><div><div style="font-weight:700;font-size:14.5px;color:#20122F;">NMC Process</div><div style="font-size:12px;color:#9A92A4;">Understand each stage</div></div></div>' +
      '<div style="background:#fff;border:1px solid #ECE6DA;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:12px;"><span style="width:40px;height:40px;border-radius:11px;background:#FBEFD3;display:flex;align-items:center;justify-content:center;font-size:18px;">✍️</span><div><div style="font-weight:700;font-size:14.5px;color:#20122F;">Reflective Practice</div><div style="font-size:12px;color:#9A92A4;">Write with confidence</div></div></div>' +
      '<div style="background:#fff;border:1px solid #ECE6DA;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:12px;"><span style="width:40px;height:40px;border-radius:11px;background:#F1ECF4;display:flex;align-items:center;justify-content:center;font-size:18px;">💬</span><div><div style="font-weight:700;font-size:14.5px;color:#20122F;">Confidence</div><div style="font-size:12px;color:#9A92A4;">Rebuild after FtP</div></div></div>' +

        '<div style="padding:18px 20px 20px;display:flex;flex-direction:column;flex:1;">' +

    if (state.tab === 'about') {
      tabBody = '<h3 style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:19px;margin:0 0 10px;color:#20122F;">About course</h3>' +
        '<p style="font-size:15.5px;line-height:1.7;color:#5C5369;margin:0 0 14px;">' + esc(sc.blurb) + '</p>' +

    }).join('');
    var th = 'font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:#9A92A4;font-weight:600;padding:16px 18px;';
    return '<div style="background:#fff;border:1px solid #ECE6DA;border-radius:20px;padding:8px 8px 4px;overflow-x:auto;"><table style="width:100%;border-collapse:collapse;min-width:720px;"><thead><tr style="text-align:left;"><th style="' + th + '">Member</th><th style="' + th + '">Regulator</th><th style="' + th + '">Courses</th><th style="' + th + '">Progress</th><th style="' + th + '">Status</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function loginGate() {
    var pending = state.pendingRole;
    var learnerOn = pending === 'learner';
    return '<div style="position:fixed;inset:0;z-index:100;background:linear-gradient(150deg,#241338,#160B26);display:flex;align-items:center;justify-content:center;padding:24px;">' +
      '<div style="display:flex;width:100%;max-width:940px;background:#fff;border-radius:26px;overflow:hidden;box-shadow:0 50px 120px -50px rgba(0,0,0,0.6);">' +
        '<div class="fp-gate-brand" style="flex:1 1 380px;background:linear-gradient(160deg,#1E9466,#0F6647);padding:44px 40px;color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-width:0;">' +
          '<img src="assets/img/F2P-logo-08-2.png" alt="Fit to Practise" style="height:42px;width:auto;align-self:flex-start;">' +
          '<div><h2 style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:30px;line-height:1.12;margin:0 0 12px;">Your learning &amp; mentorship portal</h2><p style="font-size:15.5px;line-height:1.6;color:rgba(255,255,255,0.9);margin:0;">Track courses and progress as a learner — or sign in as the business owner to see analytics and members.</p></div>' +
          '<div style="display:flex;gap:20px;font-size:13px;color:rgba(255,255,255,0.85);"><span>Lifetime access</span><span>1:1 mentorship</span></div>' +
        '</div>' +
        '<div style="flex:1 1 400px;padding:42px 40px;min-width:0;">' +
          '<h1 style="font-family:\'Schibsted Grotesk\';font-weight:800;font-size:26px;margin:0 0 6px;color:#20122F;">Sign in</h1>' +
          '<p style="font-size:14.5px;color:#6B6275;margin:0 0 22px;">Choose how you\'d like to sign in.</p>' +
          '<div style="display:flex;gap:8px;background:#F4F0E6;border-radius:14px;padding:5px;margin-bottom:22px;">' +
            '<button data-role="learner" style="flex:1;border:none;cursor:pointer;font-family:\'Hanken Grotesk\';font-weight:700;font-size:14px;padding:11px;border-radius:10px;background:' + (learnerOn ? '#fff' : 'transparent') + ';color:' + (learnerOn ? '#20122F' : '#6B6275') + ';">Learner</button>' +
            '<button data-role="owner" style="flex:1;border:none;cursor:pointer;font-family:\'Hanken Grotesk\';font-weight:700;font-size:14px;padding:11px;border-radius:10px;background:' + (learnerOn ? 'transparent' : '#fff') + ';color:' + (learnerOn ? '#6B6275' : '#20122F') + ';">Business owner</button>' +
          '</div>' +
          '<form id="gateForm" style="display:flex;flex-direction:column;gap:14px;">' +
            '<div><label style="display:block;font-size:13px;font-weight:600;color:#3A2F4A;margin-bottom:6px;">Email</label><input type="email" class="f2pin" placeholder="' + (learnerOn ? 'you@example.com' : 'cathryn@fit2practise.com') + '"></div>' +
            '<div><label style="display:block;font-size:13px;font-weight:600;color:#3A2F4A;margin-bottom:6px;">Password</label><input type="password" class="f2pin" placeholder="••••••••"></div>' +
            '<button type="submit" class="btn" style="margin-top:4px;background:#1C8A5E;color:#fff;border:none;font-family:\'Hanken Grotesk\';font-weight:700;font-size:16px;padding:15px;border-radius:13px;cursor:pointer;box-shadow:0 14px 30px -12px rgba(28,138,94,0.6);">' + (learnerOn ? 'Sign in as learner' : 'Sign in as owner') + '</button>' +
          '</form>' +
          '<p style="text-align:center;font-size:12.5px;color:#9A92A4;margin:16px 0 0;">Demo portal — sign in with any details to explore.</p>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function render() {
    var owner = state.role === 'owner';
    var view = state.view;

    var learnerNav = [['dashboard', 'Dashboard', '▦'], ['courses', 'Courses', '📖'], ['schedule', 'Schedule', '🗓'], ['instructors', 'Instructors', '🎓'], ['profile', 'Profile', '👤'], ['activity', 'Activity', '📈']];
    var ownerNav = [['analytics', 'Dashboard', '▦'], ['courses', 'Courses', '📖'], ['instructors', 'Instructors', '🎓'], ['users', 'Members', '👥'], ['profile', 'Profile', '👤']];
    var items = owner ? ownerNav : learnerNav;
    var activeMap = { coursedetail: 'courses' };
    var navHtml = items.map(function (it) {
      var on = view === it[0] || activeMap[view] === it[0];
      return '<button data-nav="' + it[0] + '" class="navitem" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;border:none;cursor:pointer;font-family:\'Hanken Grotesk\';font-weight:600;font-size:15px;padding:12px 14px;border-radius:13px;background:' + (on ? '#1C8A5E' : 'transparent') + ';color:' + (on ? '#fff' : '#3A2F4A') + ';"><span style="width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;">' + it[2] + '</span><span class="lbl">' + it[1] + '</span></button>';
    }).join('');

    var titles = { dashboard: 'Dashboard', analytics: 'Dashboard', courses: 'Courses', coursedetail: 'Courses', schedule: 'Schedule', instructors: 'Instructors', profile: 'Profile', activity: 'Activity', users: 'Members' };

    var userName = owner ? 'Cathryn Watters' : 'Jane Smith';
    var userEmail = owner ? 'cathryn@fit2practise.com' : 'jane.smith@example.com';
    var initials = userName.split(' ').map(function (w) { return w[0]; }).slice(0, 2).join('');

    var enrolled = computeEnrolled();
    var avg = enrolled.length ? Math.round(enrolled.reduce(function (s, i) { return s + i.pct; }, 0) / enrolled.length) : 0;
    var done = enrolled.filter(function (i) { return i.pct >= 100; }).length;
    var hours = enrolled.reduce(function (s, i) { return s + i.c.hours; }, 0);
    var inProgress = enrolled.filter(function (i) { return i.pct > 0 && i.pct < 100; }).length;
    var upcoming = Math.max(0, F.COURSES.length - enrolled.length);
    var agg = { items: enrolled, avg: avg, done: done, hours: hours, inProgress: inProgress, upcoming: upcoming };
    var id = { userName: userName, userEmail: userEmail, initials: initials };

    var body = '';
    if (!owner && view === 'dashboard') body = dashboardView(agg);
    else if (view === 'courses') body = coursesView();
    else if (view === 'coursedetail') body = detailView();
    else if (view === 'instructors') body = instructorsView();
    else if (view === 'profile') body = profileView(id, agg);
    else if (view === 'schedule') body = scheduleView();
    else if (view === 'activity') body = activityView();
    else if (owner && view === 'analytics') body = analyticsView();
    else if (owner && view === 'users') body = usersView();

    var shell = '<div style="display:flex;min-height:100vh;">' +
      '<aside class="fp-side" style="width:248px;flex-shrink:0;background:#fff;border-right:1px solid #ECE6DA;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:22px 16px;">' +
        '<div style="padding:6px 10px 22px;"><a href="index.html"><img src="assets/img/F2P-logo-09-2.png" alt="Fit to Practise" style="height:40px;width:auto;display:block;"></a></div>' +
        '<nav style="display:flex;flex-direction:column;gap:5px;">' + navHtml + '</nav>' +
        '<div class="upsell" style="margin-top:auto;background:linear-gradient(160deg,#F1ECF4,#EAF6F0);border:1px solid #E7E1D4;border-radius:18px;padding:18px;"><div style="font-family:\'Schibsted Grotesk\';font-weight:700;font-size:15px;color:#20122F;line-height:1.25;">Need 1:1 support?</div><p style="font-size:12.5px;line-height:1.5;color:#6B6275;margin:6px 0 12px;">Book mentorship with a professional who\'s been through it.</p><button data-nav="courses" class="btn" style="background:#1C8A5E;color:#fff;border:none;font-family:\'Hanken Grotesk\';font-weight:700;font-size:13px;padding:9px 16px;border-radius:999px;cursor:pointer;">Get mentorship</button></div>' +
      '</aside>' +
      '<div class="fp-scroll" style="flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;">' +
        '<header style="position:sticky;top:0;z-index:30;background:rgba(244,240,230,0.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid #ECE6DA;padding:16px 30px;display:flex;align-items:center;gap:20px;">' +
          '<h1 style="font-family:\'Schibsted Grotesk\';font-weight:800;letter-spacing:-0.02em;font-size:26px;margin:0;color:#20122F;flex-shrink:0;">' + (titles[view] || 'Dashboard') + '</h1>' +
          '<div class="fp-topsearch" style="flex:1;max-width:460px;margin:0 auto;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ECE6DA;border-radius:999px;padding:10px 18px;"><span style="color:#9A92A4;">⌕</span><input placeholder="Search here…" style="border:none;outline:none;background:transparent;font-family:\'Hanken Grotesk\';font-size:14.5px;width:100%;color:#20122F;"></div>' +
          '<div style="display:flex;align-items:center;gap:16px;margin-left:auto;flex-shrink:0;">' +
            '<span style="font-size:13.5px;color:#6B6275;font-weight:600;">🇬🇧 Eng (UK)</span>' +
            '<span style="position:relative;font-size:17px;cursor:pointer;">🔔<span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:#1C8A5E;border:1.5px solid #F4F0E6;"></span></span>' +
            '<a href="index.html" title="Back to website" style="font-size:16px;">🌐</a>' +
            '<div style="display:flex;align-items:center;gap:10px;padding-left:14px;border-left:1px solid #E3DCCD;"><div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(150deg,#1E9466,#0F6647);display:flex;align-items:center;justify-content:center;color:#fff;font-family:\'Schibsted Grotesk\';font-weight:700;font-size:14px;">' + esc(initials) + '</div><div style="line-height:1.2;"><div style="font-weight:700;font-size:13.5px;color:#20122F;">' + esc(userName) + '</div><div style="font-size:11.5px;color:#9A92A4;">' + (owner ? 'Business owner' : 'Learner') + '</div></div></div>' +
            '<button data-act="logout" class="btn" title="Log out" style="background:#fff;border:1px solid #E3DCCD;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:14px;">⏻</button>' +
          '</div>' +
        '</header>' +
        '<div style="padding:26px 30px 40px;">' + body + '</div>' +
      '</div>' +
    '</div>';

    if (!state.role) shell += loginGate();
    app.innerHTML = shell;
    wire();
  }

  function wire() {
    Array.prototype.forEach.call(app.querySelectorAll('[data-nav]'), function (b) {
      b.addEventListener('click', function () { state.view = b.getAttribute('data-nav'); render(); app.scrollTop = 0; });
    });
    Array.prototype.forEach.call(app.querySelectorAll('[data-open]'), function (b) {
      b.addEventListener('click', function () { state.view = 'coursedetail'; state.sel = b.getAttribute('data-open'); state.tab = 'about'; render(); });
    });
    Array.prototype.forEach.call(app.querySelectorAll('[data-tab]'), function (b) {
      b.addEventListener('click', function () { state.tab = b.getAttribute('data-tab'); render(); });
    });
    var logout = app.querySelector('[data-act="logout"]');
    if (logout) logout.addEventListener('click', function () {
      try { localStorage.removeItem('f2p_portal_role'); } catch (e) {}
      state.role = null; render();
    });
    var editsite = app.querySelector('[data-act="editsite"]');
    if (editsite) editsite.addEventListener('click', function () { location.href = 'profile.html'; });
    Array.prototype.forEach.call(app.querySelectorAll('[data-role]'), function (b) {
      b.addEventListener('click', function () { state.pendingRole = b.getAttribute('data-role'); render(); });
    });
    var gate = app.querySelector('#gateForm');
    if (gate) gate.addEventListener('submit', function (e) {
      e.preventDefault();
      var role = state.pendingRole;
      try { localStorage.setItem('f2p_portal_role', role); } catch (e2) {}
      state.role = role;
      state.view = role === 'owner' ? 'analytics' : 'dashboard';
      render();
    });
  }

  window.addEventListener('f2p-change', render);
  render();
})();
</script>
</body>
</html>
